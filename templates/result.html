<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short URL</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>

<div class="container">

    <h1>URL Created Successfully!</h1>

    <p><strong>Original URL:</strong></p>

    <p class="original">
        {{ original_url }}
    </p>

    <p><strong>Short URL:</strong></p>

    <input
        id="shortURL"
        type="text"
        value="{{ short_url }}"
        readonly
    >

    <br><br>

    <button onclick="copyURL()">
        Copy URL
    </button>

    <br><br>

    <a href="/">
        Shorten Another URL
    </a>

</div>

<script>

function copyURL(){

    let copyText = document.getElementById("shortURL");

    copyText.select();

    copyText.setSelectionRange(0,99999);

    navigator.clipboard.writeText(copyText.value);

    alert("Copied Successfully!");

}

</script>

</body>
</html>
